name: Docker

# NOTE: This workflow builds the pen-stack/structure Docker image.
# It requires the private pen-stack/plm:0.1.0 base image (built locally on
# the VM and pushed to the project's GHCR). It cannot run on GitHub-hosted
# runners without that base image. Trigger manually via workflow_dispatch
# AFTER pushing pen-stack/plm:0.1.0 to GHCR from the VM.
#
# Dockerfile location: containers/structure/Dockerfile

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (default: 'dev')"
        required: false
        default: "dev"

env:
  REGISTRY:   ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/pen-stack/structure

jobs:
  build:
    name: Build pen-stack/structure Docker image
    runs-on: ubuntu-latest
    continue-on-error: true   # Base image pen-stack/plm:0.1.0 is private; may not be present
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: |
          TAG="${{ github.event.inputs.tag || 'dev' }}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Image tag: ${TAG}"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: containers/structure/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  smoke-test:
    name: Docker smoke test
    needs: build
    if: needs.build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Pull image and run import smoke test
        run: |
          docker run --rm \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            python -c "
          from mech_class.api import Predictor
          from mech_class.features.domain import extract_domain_features
          vec = extract_domain_features(['PF01548', 'PF02371'])
          assert vec[23] == 1.0
          print('[OK] Docker smoke test passed')
          "
