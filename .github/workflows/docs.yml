name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-docs:
    name: Build Sphinx Docs
    runs-on: ubuntu-latest
    continue-on-error: true   # Sphinx warnings (-W) may fire on API changes; non-blocking
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install package + docs deps
        run: pip install -e ".[docs]"
      - name: Build Sphinx HTML
        run: |
          cd docs
          sphinx-build -b html . _build/html -W --keep-going
      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-html
          path: docs/_build/html/

  deploy-docs:
    name: Deploy to ReadTheDocs (via webhook)
    runs-on: ubuntu-latest
    needs: build-docs
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger ReadTheDocs build
        run: |
          curl -X POST \
            -d "token=${{ secrets.RTD_WEBHOOK_TOKEN }}" \
            https://readthedocs.org/api/v2/webhook/mech-class/${{ secrets.RTD_WEBHOOK_ID }}/
